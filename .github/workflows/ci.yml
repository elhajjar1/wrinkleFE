name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      # Note: Windows is intentionally not in the matrix. The desktop build
      # pipeline (PyInstaller spec + build-windows.yml) was removed in #121;
      # releases are now source-only (PyPI / source tarball). See issue #10.
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]
      fail-fast: false

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all,dev]"

      # The matrix runs only the fast lane (`-m "not slow"`): the slow
      # FE/CZM integration solves would multiply the 6-cell wall-time for
      # little marginal signal. The complete suite (and the Codecov
      # upload, which needs the slow-path coverage) runs once in
      # ``test-full`` below.
      - name: Run tests
        run: pytest --tb=short -q -m "not slow" --cov=wrinklefe --cov-report=xml --cov-report=term

      - name: Check import
        run: python -c "import wrinklefe; print(f'WrinkleFE {wrinklefe.__version__} imported successfully')"

  test-full:
    # Complete suite on a single interpreter, including the slow FE/CZM
    # integration solves the matrix job skips. `-m "not benchmark"` runs
    # everything except the pytest-benchmark performance suite (the
    # default addopts already exclude it, but an explicit -m on the CLI
    # overrides that default, so it is restated here). This is the job
    # that owns the Codecov upload — measuring coverage on the fast lane
    # alone would under-report the slow integration paths.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all,dev]"

      - name: Run full test suite
        run: pytest --tb=short -q -m "not benchmark" --cov=wrinklefe --cov-report=xml --cov-report=term

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            pyproject.toml

      - name: Install with docs extra
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[docs]"

      # -W turns warnings (broken cross-references, bad docstring
      # syntax, stale autodoc targets) into build failures.
      - name: Build docs
        run: sphinx-build -W docs docs/_build

  examples:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            pyproject.toml

      # Minimal supported install — the examples must work without extras.
      - name: Install (minimal)
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run example scripts
        env:
          MPLBACKEND: Agg
        working-directory: examples
        run: |
          for f in *.py; do
            echo "::group::$f"
            python "$f"
            echo "::endgroup::"
          done
