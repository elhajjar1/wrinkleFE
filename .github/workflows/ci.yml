name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      # Note: Windows is intentionally not in the matrix. The desktop build
      # pipeline (PyInstaller spec + build-windows.yml) was removed in #121;
      # releases are now source-only (PyPI / source tarball). See issue #10.
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]
      fail-fast: false

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all,dev]"

      - name: Run tests
        run: pytest --tb=long -v --cov=wrinklefe --cov-report=xml --cov-report=term 2>&1 | tee pytest-output.txt
        shell: bash

      - name: Post macOS failure as PR comment (debug)
        if: failure() && matrix.os == 'macos-latest' && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const log = fs.readFileSync('pytest-output.txt', 'utf8');
            const tail = log.split('\n').slice(-150).join('\n');
            const body = `### macOS ${{ matrix.python-version }} CI failure log (last 150 lines)\n\n\`\`\`\n${tail}\n\`\`\``;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body,
            });

      - name: Check import
        run: python -c "import wrinklefe; print(f'WrinkleFE {wrinklefe.__version__} imported successfully')"

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
