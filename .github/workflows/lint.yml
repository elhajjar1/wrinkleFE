name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install lint tooling
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      # Full config: CI now runs ruff's complete pyproject.toml ruleset
      # (E, F, W, I, N, UP) with no --select override, completing the
      # incremental widening tracked in issue #87. The scientific-naming
      # codes that clash with composite-mechanics notation (N802/803/806/
      # 815/816) are documented ignores in pyproject's [tool.ruff.lint].
      - name: Ruff (full pyproject config)
        run: ruff check .

      # Whole-tree mypy: the src/wrinklefe package plus the repo-root
      # Streamlit entry points (app.py, streamlit_viz.py). Completes the
      # mypy-coverage walk tracked as a follow-up to issue #87; streamlit
      # and plotly are unstubbed and ignored via pyproject [tool.mypy].
      - name: Mypy (whole tree)
        run: mypy src/wrinklefe app.py streamlit_viz.py
