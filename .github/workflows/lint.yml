name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install lint tooling
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      # Full config: CI now runs ruff's complete pyproject.toml ruleset
      # (E, F, W, I, N, UP) with no --select override, completing the
      # incremental widening tracked in issue #87. The scientific-naming
      # codes that clash with composite-mechanics notation (N802/803/806/
      # 815/816) are documented ignores in pyproject's [tool.ruff.lint].
      - name: Ruff (full pyproject config)
        run: ruff check .

      # Walking outward module-by-module (expand-mypy-coverage skill):
      # core/ and elements/ are clean; failure/, solver/, viz/, sweep/,
      # io/, analysis.py, and cli.py still carry errors (mostly numpy
      # `Any` returns) and are the next passes.
      - name: Mypy (scope - package init + core + elements)
        run: mypy src/wrinklefe/__init__.py src/wrinklefe/core src/wrinklefe/elements
