name: Build Windows Executable

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -e ".[all]"

      - name: Build wrinklefe.exe
        run: pyinstaller wrinklefe_windows.spec --clean --noconfirm

      - name: Smoke-test executable
        run: |
          if (-not (Test-Path "dist/wrinklefe.exe")) {
            Write-Error "dist/wrinklefe.exe not produced"
            exit 1
          }
          Get-Item "dist/wrinklefe.exe" | Select-Object Name, Length

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wrinklefe-windows
          path: dist/wrinklefe.exe
          if-no-files-found: error

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/wrinklefe.exe
